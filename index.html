<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投篮训练记录器 - 像素复古风</title>
    <!-- 引入像素风格字体，如果无法加载则使用等宽字体作为后备 -->
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'DotGothic16', "Courier New", Courier, monospace; 
            padding: 12px; max-width: 600px; margin: auto; 
            /* 像素风经典网格/棋盘格背景 */
            background-color: #dcb37b; 
            background-image: 
                repeating-linear-gradient(45deg, #d2a66b 25%, transparent 25%, transparent 75%, #d2a66b 75%, #d2a66b), 
                repeating-linear-gradient(45deg, #d2a66b 25%, #dcb37b 25%, #dcb37b 75%, #d2a66b 75%, #d2a66b);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
            color: #000;
            font-weight: bold;
            min-height: 100vh;
        }
        
        /* 像素风通用边框与阴影 (硬边缘) */
        .pixel-box {
            background: #fff;
            border: 4px solid #000;
            box-shadow: 4px 4px 0 #000;
            margin-bottom: 15px;
        }
        
        h2 { 
            text-align: center; margin: 5px 0 15px 0; font-size: 24px; color: #fff; 
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000; 
            letter-spacing: 2px;
        }
        
        .tabs { display: flex; margin-bottom: 15px; gap: 8px;}
        .tab { 
            flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 16px; 
            border: 4px solid #000; background: #b0b0b0; color: #000; 
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.3);
        }
        .tab.active { 
            background: #4baee8; color: #fff; 
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.3); 
            text-shadow: 1px 1px 0 #000;
        }
        
        .view-container { display: none; }
        .view-container.active { display: block; }
        
        .header { display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .date-display { 
            font-size: 14px; color: #fff; background: #000; padding: 6px 12px; 
            border: 4px solid #fff; box-shadow: 4px 4px 0 #000; 
        }
        
        button { 
            border: 4px solid #000; cursor: pointer; font-family: inherit; font-weight: bold; 
            padding: 10px; text-transform: uppercase;
        }
        /* 像素风按压反馈：取消阴影并产生位移 */
        button:active { transform: translate(4px, 4px); box-shadow: none !important; }
        
        .btn-save { 
            background: #f7d51d; color: #000; font-size: 18px; width: 100%; margin-top: 10px; 
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.2), 4px 4px 0 #000; 
        }
        .btn-clear-all { 
            background: transparent; color: #000; padding: 10px; font-size: 14px; margin-top: 10px; 
            width: 100%; border: none; text-decoration: underline; box-shadow: none;
        }
        .btn-clear-all:active { transform: none; color: #e74c3c;}
        
        .total-stats { 
            padding: 10px; display: flex; justify-content: space-around; align-items: center; 
            background: #fff; border: 4px solid #000; box-shadow: 4px 4px 0 #000; margin-bottom: 15px;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-value { font-size: 26px; color: #000; }
        .stat-label { font-size: 14px; color: #555; margin-top: 4px;}
        
        /* 网格排版 */
        .spots-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .spot-container { 
            padding: 10px; display: flex; flex-direction: column; 
            background: #e0f8cf; /* 怀旧 Gameboy 绿色调 */
            border: 4px solid #000; box-shadow: 4px 4px 0 #000;
        } 
        .spot-container:nth-child(5) { grid-column: span 2; }

        .spot-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 8px; border-bottom: 4px solid #000; padding-bottom: 4px; 
        }
        .spot-title { font-size: 18px; margin: 0; color: #000;}
        .btn-undo-spot { 
            background: #ccc; color: #000; padding: 2px 6px; font-size: 12px; 
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.3); border: 2px solid #000;
        }
        .btn-undo-spot:active { transform: translate(2px, 2px); box-shadow: none !important; }
        
        .action-row { display: flex; gap: 6px; margin-bottom: 6px; }
        .action-row button { 
            padding: 10px 0; font-size: 16px; flex: 1; 
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.3), 4px 4px 0 #000;
        }
        .btn-make { background: #5ac54f; color: #fff; text-shadow: 1px 1px 0 #000;}
        .btn-miss { background: #d95763; color: #fff; text-shadow: 1px 1px 0 #000;}
        .btn-minus { 
            background: #fff; color: #000; max-width: 40px; 
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2), 4px 4px 0 #000; font-size: 14px;
        } 
        
        .stats { 
            display: flex; justify-content: space-between; font-size: 14px; color: #000; 
            margin-top: 6px; background: #fff; padding: 4px; border: 2px solid #000;
        }
        
        .history-selector { 
            width: 100%; padding: 10px; font-size: 16px; margin-bottom: 20px; 
            border: 4px solid #000; background: #fff; color: #000; outline: none; 
            box-shadow: 4px 4px 0 #000; font-family: inherit; font-weight: bold;
        }
        .empty-msg { 
            text-align: center; color: #000; padding: 40px 20px; font-size: 16px; 
            background: #fff; border: 4px solid #000; box-shadow: 4px 4px 0 #000;
        }
    </style>
</head>
<body>

    <h2>投篮训练记录器</h2>
    
    <div class="tabs">
        <div class="tab active" id="tab-train" onclick="switchTab('train')">今日训练</div>
        <div class="tab" id="tab-history" onclick="switchTab('history')">历史记录</div>
    </div>

    <!-- 今日训练视图 -->
    <div id="view-train" class="view-container active">
        <div class="header">
            <span class="date-display" id="current-date-display"></span>
        </div>
        
        <div id="train-total-display"></div>
        <div id="train-app"></div>
        
        <button class="btn-save" onclick="saveTodayData()">💾 保存今日数据</button>
        <button class="btn-clear-all" onclick="clearTodayData()">清空今日临时数据</button>
    </div>

    <!-- 历史记录视图 -->
    <div id="view-history" class="view-container">
        <select id="history-date-selector" class="history-selector" onchange="renderHistoryView()">
            <option value="">-- 请选择日期 --</option>
        </select>
        
        <div id="history-content">
            <!-- 历史数据将渲染在这里 -->
        </div>
    </div>

    <script>
        const numSpots = 5;
        
        function getTodayString() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }
        
        const todayStr = getTodayString();

        let todayData = JSON.parse(localStorage.getItem('basketballCurrent')) || Array.from({ length: numSpots }, () => ({ makes: 0, misses: 0 }));
        let historyData = JSON.parse(localStorage.getItem('basketballHistory')) || {};

        function saveLocalCurrent() {
            localStorage.setItem('basketballCurrent', JSON.stringify(todayData));
        }

        function saveTodayData() {
            historyData[todayStr] = JSON.parse(JSON.stringify(todayData));
            localStorage.setItem('basketballHistory', JSON.stringify(historyData));
            alert(`已成功保存 ${todayStr} 的训练数据！`);
        }

        function clearTodayData() {
            if(confirm("警告：确定要清空今日的所有训练数据吗？")) {
                if(confirm("再次确认：清空后无法恢复，确定要彻底清空吗？")) {
                    todayData = Array.from({ length: numSpots }, () => ({ makes: 0, misses: 0 }));
                    saveLocalCurrent();
                    renderTrainView();
                }
            }
        }

        function recordShot(index, isMake) {
            if (isMake) {
                todayData[index].makes += 1;
            } else {
                todayData[index].misses += 1;
            }
            saveLocalCurrent();
            renderTrainView(); 
        }

        function undoShot(index, isMake) {
            if (isMake) {
                if (todayData[index].makes > 0) {
                    todayData[index].makes -= 1;
                }
            } else {
                if (todayData[index].misses > 0) {
                    todayData[index].misses -= 1;
                }
            }
            saveLocalCurrent();
            renderTrainView();
        }

        function resetSpot(index) {
            if (confirm(`确定要将【点位 ${index + 1}】的数据归零吗？`)) {
                if (confirm(`再次确认：真的要将【点位 ${index + 1}】彻底归零吗？操作不可逆转！`)) {
                    todayData[index].makes = 0;
                    todayData[index].misses = 0;
                    saveLocalCurrent();
                    renderTrainView();
                }
            }
        }

        function switchTab(tabName) {
            document.getElementById('tab-train').className = 'tab' + (tabName === 'train' ? ' active' : '');
            document.getElementById('tab-history').className = 'tab' + (tabName === 'history' ? ' active' : '');
            
            document.getElementById('view-train').className = 'view-container' + (tabName === 'train' ? ' active' : '');
            document.getElementById('view-history').className = 'view-container' + (tabName === 'history' ? ' active' : '');

            if (tabName === 'history') {
                updateHistorySelector();
                renderHistoryView();
            }
        }

        function generateStatsHTML(dataArray, isReadOnly = false) {
            let overallMakes = 0;
            let overallMisses = 0;
            
            dataArray.forEach(spot => {
                overallMakes += spot.makes;
                overallMisses += spot.misses;
            });
            
            const overallTotal = overallMakes + overallMisses;
            const overallPercentage = overallTotal === 0 ? 0 : ((overallMakes / overallTotal) * 100).toFixed(1);

            let html = `
                <div class="total-stats">
                    <div class="stat-box">
                        <span class="stat-value">${overallTotal}</span>
                        <span class="stat-label">总投篮</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value">${overallMakes}</span>
                        <span class="stat-label">总进球</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value">${overallPercentage}%</span>
                        <span class="stat-label">命中率</span>
                    </div>
                </div>
                <div class="spots-grid">
            `;

            dataArray.forEach((spot, index) => {
                const total = spot.makes + spot.misses;
                const percentage = total === 0 ? 0 : ((spot.makes / total) * 100).toFixed(1);

                html += `
                    <div class="spot-container">
                        <div class="spot-header">
                            <h3 class="spot-title">点位 ${index + 1}</h3>
                            ${isReadOnly ? '' : `<button class="btn-undo-spot" onclick="resetSpot(${index})">重置</button>`}
                        </div>
                        
                        ${isReadOnly ? '' : `
                        <div class="action-row">
                            <button class="btn-make" onclick="recordShot(${index}, true)">进 +1</button>
                            <button class="btn-minus" onclick="undoShot(${index}, true)">-1</button>
                        </div>
                        <div class="action-row">
                            <button class="btn-miss" onclick="recordShot(${index}, false)">失 +1</button>
                            <button class="btn-minus" onclick="undoShot(${index}, false)">-1</button>
                        </div>
                        `}
                        <div class="stats">
                            <span>进${spot.makes} / 失${spot.misses}</span>
                            <span>${percentage}%</span>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            return html;
        }

        function renderTrainView() {
            document.getElementById('current-date-display').innerText = `📅 ${todayStr}`;
            document.getElementById('train-total-display').innerHTML = generateStatsHTML(todayData, false).split('<div class="spots-grid">')[0];
            document.getElementById('train-app').innerHTML = '<div class="spots-grid">' + generateStatsHTML(todayData, false).split('<div class="spots-grid">')[1];
        }

        function updateHistorySelector() {
            const selector = document.getElementById('history-date-selector');
            selector.innerHTML = '<option value="">-- 请选择历史日期 --</option>';
            
            const dates = Object.keys(historyData).sort((a, b) => new Date(b) - new Date(a));
            
            if (dates.length === 0) {
                selector.innerHTML = '<option value="">暂无历史记录</option>';
                return;
            }

            dates.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.text = date;
                selector.appendChild(option);
            });
        }

        function renderHistoryView() {
            const date = document.getElementById('history-date-selector').value;
            const contentDiv = document.getElementById('history-content');
            
            if (!date || !historyData[date]) {
                contentDiv.innerHTML = '<div class="empty-msg">请在上方选择一个日期以查看数据。</div>';
                return;
            }

            const targetData = historyData[date];
            contentDiv.innerHTML = generateStatsHTML(targetData, true);
        }

        renderTrainView();
    </script>
</body>
</html>
