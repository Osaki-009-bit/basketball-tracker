<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投篮训练记录器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .spot-container { 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            padding: 15px; 
            background-color: #f9f9f9;
        }
        .btn-make { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;}
        .btn-miss { background-color: #f44336; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;}
        .btn-undo { background-color: #9e9e9e; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 10px;}
        .stats { margin-top: 10px; font-weight: bold; font-size: 18px; }
        .controls { margin-top: 10px; }
    </style>
</head>
<body>

    <h2>投篮训练记录器</h2>
    <div id="app"></div>

    <script>
        // 初始化5个点位的数据
        const numSpots = 5;
        let spotsData = Array.from({ length: numSpots }, () => ({ makes: 0, misses: 0 }));

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = ''; 

            spotsData.forEach((spot, index) => {
                const total = spot.makes + spot.misses;
                // 计算命中率，如果分母为0则显示0%
                const percentage = total === 0 ? 0 : ((spot.makes / total) * 100).toFixed(1);

                const div = document.createElement('div');
                div.className = 'spot-container';
                div.innerHTML = `
                    <h3>点位 ${index + 1} 
                        <button class="btn-undo" onclick="resetSpot(${index})">重置归零</button>
                    </h3>
                    <div class="controls">
                        <button class="btn-make" onclick="recordShot(${index}, true)">进球 +1</button>
                        <button class="btn-miss" onclick="recordShot(${index}, false)">不进 +1</button>
                    </div>
                    <div class="stats">
                        进球: ${spot.makes} | 不进: ${spot.misses} <br>
                        总投篮: ${total} | 命中率: <span style="color: ${percentage >= 50 ? 'green' : 'red'};">${percentage}%</span>
                    </div>
                `;
                app.appendChild(div);
            });
        }

        // 记录投篮：isMake为true代表进球，false代表不进
        function recordShot(index, isMake) {
            if (isMake) {
                spotsData[index].makes += 1;
            } else {
                spotsData[index].misses += 1;
            }
            render(); // 每次点击后重新渲染界面刷新数据
        }

        // 重置单个点位的数据
        function resetSpot(index) {
            spotsData[index].makes = 0;
            spotsData[index].misses = 0;
            render();
        }

        // 初始渲染
        render();
    </script>
</body>
</html>
