<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投篮训练记录器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        h2 {
            margin-top: 0;
            font-size: 22px;
            font-weight: bold;
        }
        .header-panel {
            background-color: #eef2f9;
            border: 1px solid #d0d7e5;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .controls-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .controls-row input[type="date"] {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .controls-row input[type="number"] {
            width: 50px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }
        .btn-save {
            background-color: #3a75c4;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-save:hover { background-color: #2b5a9e; }
        
        .btn-export {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-export:hover { background-color: #f57c00; }
        
        .btn-import {
            background-color: #9c27b0;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-import:hover { background-color: #7b1fa2; }

        .note {
            font-size: 13px;
            color: #555;
            margin: 0;
            margin-top: 5px;
        }
        .spot-card {
            background-color: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .spot-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .spot-title {
            font-weight: bold;
            font-size: 16px;
        }
        .btn-reset {
            background-color: #b0bec5;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-reset:hover { background-color: #90a4ae; }
        .spot-actions {
            margin-bottom: 15px;
        }
        .btn-make {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        .btn-make:hover { background-color: #43a047; }
        .btn-miss {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-miss:hover { background-color: #e53935; }
        .spot-stats {
            font-size: 14px;
            line-height: 1.8;
            color: #111;
        }
        .stat-highlight {
            font-weight: bold;
            color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>投篮训练记录器</h2>
    
    <div class="header-panel">
        <div class="controls-row">
            <input type="date" id="dateInput">
            <span>第 <input type="number" id="dayInput" value="3" min="1"> 天</span>
            <button class="btn-save" id="saveBtn">💾 保存当前</button>
            <button class="btn-export" id="exportBtn">⬇️ 导出备份</button>
            <button class="btn-import" id="importBtn">⬆️ 导入备份</button>
            <input type="file" id="importFile" style="display: none;" accept=".json">
        </div>
        <p class="note">注：数据默认保存在浏览器。点击“导出备份”可将所有历史数据生成本地文件进行物理保存。</p>
    </div>

    <div id="spotsContainer">
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const dayInput = document.getElementById('dayInput');
        const dateInput = document.getElementById('dateInput');
        const saveBtn = document.getElementById('saveBtn');
        const exportBtn = document.getElementById('exportBtn');
        const importBtn = document.getElementById('importBtn');
        const importFile = document.getElementById('importFile');
        const spotsContainer = document.getElementById('spotsContainer');

        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;

        let spotsData = Array(5).fill().map(() => ({ make: 0, miss: 0 }));

        function createSpotHTML(index) {
            return `
            <div class="spot-card">
                <div class="spot-header">
                    <span class="spot-title">点位 ${index + 1}</span>
                    <button class="btn-reset" onclick="resetSpot(${index})">重置归零</button>
                </div>
                <div class="spot-actions">
                    <button class="btn-make" onclick="addMake(${index})">进球 +1</button>
                    <button class="btn-miss" onclick="addMiss(${index})">不进 +1</button>
                </div>
                <div class="spot-stats">
                    进球: <span id="make-count-${index}">0</span> | 不进: <span id="miss-count-${index}">0</span><br>
                    总投篮: <span id="total-count-${index}">0</span> | 命中率: <span id="percent-count-${index}" class="stat-highlight">0%</span>
                </div>
            </div>
            `;
        }

        function renderAllSpots() {
            spotsContainer.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                spotsContainer.innerHTML += createSpotHTML(i);
            }
            updateAllUI();
        }

        function updateAllUI() {
            for (let i = 0; i < 5; i++) {
                updateUI(i);
            }
        }

        function updateUI(index) {
            const data = spotsData[index];
            const total = data.make + data.miss;
            const percent = total === 0 ? 0 : Math.round((data.make / total) * 100);

            document.getElementById(`make-count-${index}`).innerText = data.make;
            document.getElementById(`miss-count-${index}`).innerText = data.miss;
            document.getElementById(`total-count-${index}`).innerText = total;
            document.getElementById(`percent-count-${index}`).innerText = percent + '%';
        }

        window.addMake = function(index) {
            spotsData[index].make += 1;
            updateUI(index);
        };

        window.addMiss = function(index) {
            spotsData[index].miss += 1;
            updateUI(index);
        };

        window.resetSpot = function(index) {
            const firstConfirm = confirm(`确定要重置 点位 ${index + 1} 的数据吗？`);
            if (firstConfirm) {
                const secondConfirm = confirm(`再次确认：您真的要清零 点位 ${index + 1} 吗？`);
                if (secondConfirm) {
                    spotsData[index] = { make: 0, miss: 0 };
                    updateUI(index);
                }
            }
        };

        function loadDataForDay(day) {
            const savedData = localStorage.getItem(`basketball_training_day_${day}`);
            if (savedData) {
                const parsed = JSON.parse(savedData);
                spotsData = parsed.spots;
                if (parsed.date) {
                    dateInput.value = parsed.date;
                }
            } else {
                spotsData = Array(5).fill().map(() => ({ make: 0, miss: 0 }));
                dateInput.value = new Date().toISOString().split('T')[0]; 
            }
            updateAllUI();
        }

        function saveDataForDay() {
            const day = dayInput.value;
            const dataToSave = {
                date: dateInput.value,
                spots: spotsData
            };
            localStorage.setItem(`basketball_training_day_${day}`, JSON.stringify(dataToSave));
            alert(`✅ 第 ${day} 天的数据已在浏览器保存！`);
        }

        dayInput.addEventListener('change', (e) => {
            const newDay = e.target.value;
            if (newDay > 0) {
                loadDataForDay(newDay);
            }
        });

        saveBtn.addEventListener('click', () => {
            saveDataForDay();
        });

        // 导出功能
        exportBtn.addEventListener('click', () => {
            let allData = {};
            let hasData = false;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('basketball_training_day_')) {
                    allData[key] = JSON.parse(localStorage.getItem(key));
                    hasData = true;
                }
            }
            
            if (!hasData) {
                alert('⚠️ 目前没有可导出的训练数据。');
                return;
            }

            const dataStr = JSON.stringify(allData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `投篮数据备份_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // 导入功能
        importBtn.addEventListener('click', () => {
            importFile.click();
        });

        importFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const importedData = JSON.parse(event.target.result);
                    let count = 0;
                    for (let key in importedData) {
                        if (key.startsWith('basketball_training_day_')) {
                            localStorage.setItem(key, JSON.stringify(importedData[key]));
                            count++;
                        }
                    }
                    if (count > 0) {
                        alert(`✅ 成功导入了 ${count} 天的训练数据！`);
                        loadDataForDay(dayInput.value); 
                    } else {
                        alert('⚠️ 文件中没有检测到有效的训练数据。');
                    }
                } catch (error) {
                    alert('❌ 数据格式错误，导入失败。');
                }
                importFile.value = '';
            };
            reader.readAsText(file);
        });

        renderAllSpots();
        loadDataForDay(dayInput.value);
    });
</script>
</body>
</html>
