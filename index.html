<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投篮训练记录器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            margin-top: 0;
            font-size: 22px;
            font-weight: bold;
        }
        .header-panel {
            background-color: #eef2f9;
            border: 1px solid #d0d7e5;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .controls-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .controls-row input[type="date"] {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .controls-row input[type="number"] {
            width: 50px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }
        .btn-save {
            background-color: #3a75c4;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-save:hover {
            background-color: #2b5a9e;
        }
        .note {
            font-size: 13px;
            color: #555;
            margin: 0;
        }
        .spot-card {
            background-color: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .spot-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .spot-title {
            font-weight: bold;
            font-size: 16px;
        }
        .btn-reset {
            background-color: #b0bec5;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-reset:hover {
            background-color: #90a4ae;
        }
        .spot-actions {
            margin-bottom: 15px;
        }
        .btn-make {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        .btn-make:hover {
            background-color: #43a047;
        }
        .btn-miss {
