<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投篮训练记录器</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 12px; max-width: 600px; margin: auto; 
            /* 柔和的渐变背景色 */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            color: #2c3e50;
            min-height: 100vh;
        }
        h2 { text-align: center; margin: 5px 0 15px 0; font-size: 22px; font-weight: 800; color: #2c3e50; letter-spacing: 1px; }
        
        /* Glassmorphism (玻璃拟态) 核心类 */
        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
        }

        /* 选项卡样式 */
        .tabs { display: flex; margin-bottom: 15px; padding: 5px; border-radius: 12px; background: rgba(255,255,255,0.4); box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);}
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 15px; font-weight: 600; border-radius: 8px; transition: all 0.3s ease; color: #7f8c8d; }
        .tab.active { background: #fff; color: #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        
        /* 容器样式 */
        .view-container { display: none; }
        .view-container.active { display: block; }
        
        .header { display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .date-display { font-size: 13px; color: #576574; font-weight: 700; background: rgba(255,255,255,0.8); padding: 6px 16px; border-radius: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.03);}
        
        /* 按钮通用样式 */
        button { border: none; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: 700; transition: transform 0.1s, opacity 0.2s; }
        button:active { transform: scale(0.95); }
        
        .btn-save { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #fff; padding: 15px; font-size: 16px; width: 100%; margin-top: 15px; box-shadow: 0 6px 15px rgba(253, 160, 133, 0.4); }
        .btn-clear-all { background: transparent; color: #95a5a6; padding: 10px; font-size: 13px; margin-top: 5px; width: 100%; text-decoration: underline; font-weight: normal;}
        
        /* 统计卡片样式 */
        .total-stats { padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-around; align-items: center;}
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-value { font-size: 24px; font-weight: 800; color: #2c3e50; }
        .stat-label { font-size: 12px; color: #7f8c8d; margin-top: 4px; font-weight: 600;}
        .highlight-rate { color: #27ae60; }
        .low-rate { color: #e74c3c; }
        
        /* === 网格排版 === */
        .spots-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .spot-container { padding: 12px 12px 10px 12px; display: flex; flex-direction: column; }
        .spot-container:nth-child(5) { grid-column: span 2; }

        .spot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .spot-title { font-size: 16px; font-weight: 800; margin: 0; color: #34495e;}
        .btn-undo-spot { background: rgba(149, 165, 166, 0.15); color: #7f8c8d; padding: 5px 10px; font-size: 12px; border-radius: 6px; }
        
        /* 按键区 */
        .action-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .action-row button { padding: 12px 5px; font-size: 15px; flex: 1; }
        .btn-make { background: #2ecc71; color: white; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        .btn-miss { background: #e74c3c; color: white; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }
        .btn-minus { background: rgba(255,255,255,0.7); color: #7f8c8d; max-width: 45px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05);} 
        
        /* 紧凑的数据显示 */
        .stats { display: flex; justify-content: space-between; font-size: 12px; color: #7f8c8d; margin-top: 4px; font-weight: 600;}
        
        /* 历史记录下拉框 */
        .history-selector { width: 100%; padding: 14px; font-size: 16px; margin-bottom: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.6); background: rgba(255,255,255,0.7); color: #2c3e50; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.03); font-weight: 600;}
        .empty-msg { text-align: center; color: #95a5a6; padding: 40px 20px; font-size: 15px;}
    </style>
</head>
<body>

    <h2>🏀 投篮训练记录器</h2>
    
    <div class="tabs">
        <div class="tab active" id="tab-train" onclick="switchTab('train')">今日训练</div>
        <div class="tab" id="tab-history" onclick="switchTab('history')">历史记录</div>
    </div>

    <!-- 今日训练视图 -->
    <div id="view-train" class="view-container active">
        <div class="header">
            <span class="date-display" id="current-date-display"></span>
        </div>
        
        <div id="train-total-display"></div>
        <div id="train-app"></div>
        
        <button class="btn-save" onclick="saveTodayData()">💾 保存今日数据</button>
        <button class="btn-clear-all" onclick="clearTodayData()">清空今日临时数据</button>
    </div>

    <!-- 历史记录视图 -->
    <div id="view-history" class="view-container">
        <select id="history-date-selector" class="history-selector glass" onchange="renderHistoryView()">
            <option value="">-- 请选择日期 --</option>
        </select>
        
        <div id="history-content">
            <!-- 历史数据将渲染在这里 -->
        </div>
    </div>

    <script>
        const numSpots = 5;
        
        function getTodayString() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }
        
        const todayStr = getTodayString();

        let todayData = JSON.parse(localStorage.getItem('basketballCurrent')) || Array.from({ length: numSpots }, () => ({ makes: 0, misses: 0 }));
        let historyData = JSON.parse(localStorage.getItem('basketballHistory')) || {};

        function saveLocalCurrent() {
            localStorage.setItem('basketballCurrent', JSON.stringify(todayData));
        }

        function saveTodayData() {
            historyData[todayStr] = JSON.parse(JSON.stringify(todayData));
            localStorage.setItem('basketballHistory', JSON.stringify(historyData));
            alert(`已成功保存 ${todayStr} 的训练数据！`);
        }

        function clearTodayData() {
            if(confirm("警告：确定要清空今日的所有训练数据吗？")) {
                if(confirm("再次确认：清空后无法恢复，确定要彻底清空吗？")) {
                    todayData = Array.from({ length: numSpots }, () => ({ makes: 0, misses: 0 }));
                    saveLocalCurrent();
                    renderTrainView();
                }
            }
        }

        function recordShot(index, isMake) {
            if (isMake) {
                todayData[index].makes += 1;
            } else {
                todayData[index].misses += 1;
            }
            saveLocalCurrent();
            renderTrainView(); 
        }

        function undoShot(index, isMake) {
            if (isMake) {
                if (todayData[index].makes > 0) {
                    todayData[index].makes -= 1;
                }
            } else {
                if (todayData[index].misses > 0) {
                    todayData[index].misses -= 1;
                }
            }
            saveLocalCurrent();
            renderTrainView();
        }

        function resetSpot(index) {
            if (confirm(`确定要将【点位 ${index + 1}】的数据归零吗？`)) {
                if (confirm(`再次确认：真的要将【点位 ${index + 1}】彻底归零吗？操作不可逆转！`)) {
                    todayData[index].makes = 0;
                    todayData[index].misses = 0;
                    saveLocalCurrent();
                    renderTrainView();
                }
            }
        }

        function switchTab(tabName) {
            document.getElementById('tab-train').className = 'tab' + (tabName === 'train' ? ' active' : '');
            document.getElementById('tab-history').className = 'tab' + (tabName === 'history' ? ' active' : '');
            
            document.getElementById('view-train').className = 'view-container' + (tabName === 'train' ? ' active' : '');
            document.getElementById('view-history').className = 'view-container' + (tabName === 'history' ? ' active' : '');

            if (tabName === 'history') {
                updateHistorySelector();
                renderHistoryView();
            }
        }

        function generateStatsHTML(dataArray, isReadOnly = false) {
            let overallMakes = 0;
            let overallMisses = 0;
            
            dataArray.forEach(spot => {
                overallMakes += spot.makes;
                overallMisses += spot.misses;
            });
            
            const overallTotal = overallMakes + overallMisses;
            const overallPercentage = overallTotal === 0 ? 0 : ((overallMakes / overallTotal) * 100).toFixed(1);
            const rateClass = overallPercentage >= 50 ? 'highlight-rate' : 'low-rate';

            let html = `
                <div class="total-stats glass">
                    <div class="stat-box">
                        <span class="stat-value">${overallTotal}</span>
                        <span class="stat-label">总投篮</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value">${overallMakes}</span>
                        <span class="stat-label">总进球</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value ${rateClass}">${overallPercentage}%</span>
                        <span class="stat-label">总命中率</span>
                    </div>
                </div>
                <div class="spots-grid">
            `;

            dataArray.forEach((spot, index) => {
                const total = spot.makes + spot.misses;
                const percentage = total === 0 ? 0 : ((spot.makes / total) * 100).toFixed(1);
                const pClass = percentage >= 50 ? 'highlight-rate' : 'low-rate';

                html += `
                    <div class="spot-container glass">
                        <div class="spot-header">
                            <h3 class="spot-title">点位 ${index + 1}</h3>
                            ${isReadOnly ? '' : `<button class="btn-undo-spot" onclick="resetSpot(${index})">重置</button>`}
                        </div>
                        
                        ${isReadOnly ? '' : `
                        <div class="action-row">
                            <button class="btn-make" onclick="recordShot(${index}, true)">进 +1</button>
                            <button class="btn-minus" onclick="undoShot(${index}, true)">-1</button>
                        </div>
                        <div class="action-row">
                            <button class="btn-miss" onclick="recordShot(${index}, false)">失 +1</button>
                            <button class="btn-minus" onclick="undoShot(${index}, false)">-1</button>
                        </div>
                        `}
                        <div class="stats">
                            <span>进 ${spot.makes} / 失 ${spot.misses}</span>
                            <span class="${pClass}">${percentage}%</span>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            return html;
        }

        function renderTrainView() {
            document.getElementById('current-date-display').innerText = `📅 ${todayStr}`;
            document.getElementById('train-total-display').innerHTML = generateStatsHTML(todayData, false).split('<div class="spots-grid">')[0];
            document.getElementById('train-app').innerHTML = '<div class="spots-grid">' + generateStatsHTML(todayData, false).split('<div class="spots-grid">')[1];
        }

        function updateHistorySelector() {
            const selector = document.getElementById('history-date-selector');
            selector.innerHTML = '<option value="">-- 请选择历史日期 --</option>';
            
            const dates = Object.keys(historyData).sort((a, b) => new Date(b) - new Date(a));
            
            if (dates.length === 0) {
                selector.innerHTML = '<option value="">暂无历史记录</option>';
                return;
            }

            dates.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.text = date;
                selector.appendChild(option);
            });
        }

        function renderHistoryView() {
            const date = document.getElementById('history-date-selector').value;
            const contentDiv = document.getElementById('history-content');
            
            if (!date || !historyData[date]) {
                contentDiv.innerHTML = '<div class="empty-msg">请在上方选择一个日期以查看数据。</div>';
                return;
            }

            const targetData = historyData[date];
            contentDiv.innerHTML = generateStatsHTML(targetData, true);
        }

        renderTrainView();
    </script>
</body>
</html>
